<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip Finder AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
body {
  font-family: system-ui, Arial, sans-serif;
  background: #0f1115;
  color: #fff;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

.card {
  background: #1a1d24;
  padding: 12px;
  border-radius: 14px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

button {
  border-radius: 10px;
}

input {
  border-radius: 10px;
  background: #111;
  color: #fff;
}

h1 {
  font-size: 20px;
  margin-bottom: 8px;
}
  </style>
</head>

<body>
  <div class="container">

  <h1>Flip Finder AI</h1>

  <!-- LOGIN -->
  <div id="loginCard">
    <button onclick="login()">Continue with Google</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <!-- HEADER -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="userInfo"></span>
        <button class="small-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- SCAN -->
    <div class="card">
      <h3>Scan Item</h3>
      <input type="file" />
    </div>

    <!-- CALCULATOR -->
    <div class="card">
      <h3>Deal Analyzer</h3>

      <!-- your inputs stay here -->
      <button style="position:sticky; bottom:0;">Save Deal</button>
    </div>

    <!-- DEALS -->
    <div class="card">
      <div style="display:flex; justify-content:space-between;">
        <h3>Your Deals</h3>
        <button class="small-btn" onclick="clearDeals()">Clear</button>
      </div>
      <div id="dealList"></div>
    </div>

  </div>
</div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCUXGwHEoTSiK8ZvIkCXUGPmvk1z3NU3_M",
  authDomain: "flipfinder-ai.firebaseapp.com",
  databaseURL: "https://flipfinder-ai-default-rtdb.firebaseio.com/",
  projectId: "flipfinder-ai",
  storageBucket: "flipfinder-ai.firebasestorage.app",
  messagingSenderId: "254057060734",
  appId: "1:254057060734:web:ef1c31ae19a3d409883b2f"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    window.login = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    console.log("Logged in:", result.user);
  } catch (err) {
    console.error("Login error:", err);
    alert(err.message);
  }
};

    window.logout = async () => {
      await signOut(auth);
    };

    onAuthStateChanged(auth, (user) => {
  const loginCard = document.getElementById("loginCard");
  const app = document.getElementById("app");

  if (user) {
    currentUser = user;

    loginCard.style.display = "none";   // ✅ force hide
    app.style.display = "block";        // ✅ force show

    document.getElementById("userInfo").innerText = user.email;

    loadDeals();
  } else {
    currentUser = null;

    loginCard.style.display = "block";
    app.style.display = "none";
  }
});
    window.calculate = () => {
  const buy = parseFloat(document.getElementById("buy").value) || 0;
  const sell = parseFloat(document.getElementById("sell").value) || 0;
  const feePercent = parseFloat(document.getElementById("fee").value) || 13;
  const shippingInput = parseFloat(document.getElementById("shipping").value) || 5;
  const buyerPays = document.getElementById("buyerPays").checked;
  const targetProfit = parseFloat(document.getElementById("targetProfit").value) || 0;

  const shipping = buyerPays ? 0 : shippingInput;
  const fees = sell * (feePercent / 100);
  const profit = sell - buy - fees - shipping;
  const roi = buy > 0 ? (profit / buy) * 100 : 0;

  let maxBuy = sell - fees - shipping;
  if (targetProfit > 0) {
    maxBuy = sell - fees - shipping - targetProfit;
  }

  let decision = "", cls = "", insight = "", confidence = 0;

  if (profit > 0 && roi > 50) {
    decision = "🔥 BUY"; cls = "green";
    insight = "Excellent margin. Strong flip.";
    confidence = 90;
  } else if (profit > 0 && roi > 25) {
    decision = "✅ GOOD"; cls = "green";
    insight = "Solid deal worth considering.";
    confidence = 65;
  } else if (profit > 0) {
    decision = "⚠️ RISKY"; cls = "yellow";
    insight = "Low margin. Be cautious.";
    confidence = 45;
  } else {
    decision = "❌ SKIP"; cls = "red";
    insight = "Not profitable.";
    confidence = 15;
  }

  document.getElementById("results").innerHTML = `
    <b class="${cls}">${decision}</b><br>
    Profit: $${profit.toFixed(2)}<br>
    ROI: ${roi.toFixed(1)}%<br>
    Max Buy: $${maxBuy.toFixed(2)}<br>
    <small>${insight}</small>
  `;

  const fill = document.getElementById("fill");
  fill.style.width = confidence + "%";
  fill.style.background =
    confidence > 70 ? "#4caf50" :
    confidence > 40 ? "#ffc107" : "#ff4d4d";
};
    
    window.saveDeal = () => {
  if (!currentUser) return;

  const itemName = document.getElementById("itemName").value.trim();
  const buy = parseFloat(document.getElementById("buyPrice").value);
  const sell = parseFloat(document.getElementById("sellPrice").value);

  if (!itemName || !buy || !sell) {
    alert("Fill all fields");
    return;
  }

  const fee = sell * 0.13;
  const profit = sell - buy - fee;
  const roi = (profit / buy) * 100;

  push(ref(db, "deals/" + currentUser.uid), {
    itemName,
    buy,
    sell,
    profit,
    roi,
    createdAt: Date.now()
  });

  // clear inputs
  document.getElementById("itemName").value = "";
  document.getElementById("buyPrice").value = "";
  document.getElementById("sellPrice").value = "";
  document.getElementById("results").innerHTML = "";
};

    function loadDeals() {
      const dealsArray = Object.entries(data || {}).map(([id, d]) => ({ id, ...d }));

dealsArray.sort((a, b) => b.createdAt - a.createdAt);

dealsArray.forEach(d => {
  const div = document.createElement("div");
  div.className = "deal";

  div.innerHTML = `
  <b>${d.itemName}</b>
  <div style="font-size:12px;">
    Buy $${d.buy} → Sell $${d.sell}
  </div>
  <div class="${d.profit >= 0 ? 'green' : 'red'}">
    $${d.profit.toFixed(2)} • ${d.roi.toFixed(1)}%
  </div>
  <button class="small-btn" onclick="deleteDeal('${d.id}')">Delete</button>
`;

  container.appendChild(div);
});

    }
    ["buyPrice", "sellPrice"].forEach(id => {
    document.getElementById(id).addEventListener("input", calculate);
  });
    ["buy","sell","fee","shipping","targetProfit"].forEach(id => {
  document.getElementById(id).addEventListener("input", calculate);
});

document.getElementById("buyerPays").addEventListener("change", calculate);

    window.deleteDeal = (id) => {
  remove(ref(db, "deals/" + currentUser.uid + "/" + id));
};

window.clearDeals = () => {
  if (confirm("Delete all deals?")) {
    remove(ref(db, "deals/" + currentUser.uid));
  }
};
  </script>
</body>
</html>
