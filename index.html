<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip Finder AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #7aa2ff;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: #1a1d24;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #7aa2ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 5px;
    }

    button:hover {
      opacity: 0.9;
    }

    .deal {
      background: #222;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
    }

    .hidden {
      display: none;
    }

      h3 {
    margin-top: 0;
    color: #7aa2ff;
  }

  #results {
    margin-top: 10px;
    padding: 10px;
    background: #111;
    border-radius: 6px;
  }
  </style>
</head>

<body>
  <div class="container">
    <h1>Flip Finder AI</h1>

    <!-- LOGIN -->
    <div class="card" id="loginCard">
      <button onclick="login()">Continue with Google</button>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">

      <!-- USER -->
      <div class="card">
        <div id="userInfo"></div>
        <button onclick="logout()">Logout</button>
      </div>

      <!-- SCAN (placeholder for Botpress later) -->
      <div class="card">
        <h3>Scan Item (coming soon)</h3>
        <input type="file" id="imageInput" />
      </div>

      <!-- CALCULATOR -->
      <div class="card">
        <h3>Deal Calculator</h3>
        <input id="itemName" placeholder="Item name" />
        <input id="buyPrice" type="number" placeholder="Buy price" />
        <input id="sellPrice" type="number" placeholder="Sell price" />

        <button onclick="calculate()">Calculate</button>

        <div id="results"></div>

        <button onclick="saveDeal()">Save Deal</button>
      </div>

      <!-- DEAL LOG -->
      <div class="card">
        <h3>Your Deals</h3>
        <div id="dealList"></div>
      </div>

    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCUXGwHEoTSiK8ZvIkCXUGPmvk1z3NU3_M",
  authDomain: "flipfinder-ai.firebaseapp.com",
  databaseURL: "https://flipfinder-ai-default-rtdb.firebaseio.com/",
  projectId: "flipfinder-ai",
  storageBucket: "flipfinder-ai.firebasestorage.app",
  messagingSenderId: "254057060734",
  appId: "1:254057060734:web:ef1c31ae19a3d409883b2f"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    window.login = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    console.log("Logged in:", result.user);
  } catch (err) {
    console.error("Login error:", err);
    alert(err.message);
  }
};

    window.logout = async () => {
      await signOut(auth);
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById("loginCard").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("userInfo").innerText = user.email;

        loadDeals();
      } else {
        currentUser = null;
        document.getElementById("loginCard").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
      }
    });

    window.calculate = () => {
  const buy = parseFloat(document.getElementById("buyPrice").value) || 0;
  const sell = parseFloat(document.getElementById("sellPrice").value) || 0;

  const feeRate = 0.13;
  const fee = sell * feeRate;
  const profit = sell - buy - fee;
  const roi = buy > 0 ? (profit / buy) * 100 : 0;
  const targetROI = 30; // % you want
  const maxBuy = sell / (1 + targetROI / 100) - fee;

  const color = profit >= 0 ? "#4caf50" : "#ff4d4d";

  document.getElementById("results").innerHTML = `
    <p>Fee (13%): $${fee.toFixed(2)}</p>
    <p style="color:${color}"><b>Profit: $${profit.toFixed(2)}</b></p>
    <p>ROI: ${roi.toFixed(1)}%</p>
  `;
};
    window.saveDeal = () => {
  if (!currentUser) return;

  const itemName = document.getElementById("itemName").value.trim();
  const buy = parseFloat(document.getElementById("buyPrice").value);
  const sell = parseFloat(document.getElementById("sellPrice").value);

  if (!itemName || !buy || !sell) {
    alert("Fill all fields");
    return;
  }

  const fee = sell * 0.13;
  const profit = sell - buy - fee;
  const roi = (profit / buy) * 100;

  push(ref(db, "deals/" + currentUser.uid), {
    itemName,
    buy,
    sell,
    profit,
    roi,
    createdAt: Date.now()
  });

  // clear inputs
  document.getElementById("itemName").value = "";
  document.getElementById("buyPrice").value = "";
  document.getElementById("sellPrice").value = "";
  document.getElementById("results").innerHTML = "";
};

dealsArray.forEach(d => {

  const color = d.profit >= 0 ? "#4caf50" : "#ff4d4d";

  const div = document.createElement("div");
  div.className = "deal";
  div.innerHTML = `
    <b>${d.itemName}</b><br>
    Buy: $${d.buy} | Sell: $${d.sell}<br>
    <span style="color:${color}">
      Profit: $${d.profit.toFixed(2)} | ROI: ${d.roi.toFixed(1)}%
    </span><br>
    <small>${date}</small>
  `;
  container.appendChild(div);
});
    }
    ["buyPrice", "sellPrice"].forEach(id => {
    document.getElementById(id).addEventListener("input", calculate);
  });
  </script>
</body>
</html>
