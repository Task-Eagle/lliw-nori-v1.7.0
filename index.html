<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flip Finder AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
body {
  font-family: system-ui, Arial, sans-serif;
  background: #0f1115;
  color: #fff;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 12px;
}

h1 {
  text-align: center;
  color: #7aa2ff;
  font-size: 22px;
  margin-bottom: 10px;
}

.card {
  background: #1a1d24;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

h3 {
  margin: 0 0 8px;
  color: #7aa2ff;
  font-size: 16px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 4px 0;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

.row {
  display: flex;
  gap: 6px;
}

.row input {
  flex: 1;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #7aa2ff;
  color: #000;
  font-weight: bold;
  width: 100%;
  margin-top: 6px;
}

.small-btn {
  background: #333;
  color: #fff;
  font-size: 12px;
}

.deal {
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-top: 6px;
  font-size: 13px;
}

.green { color: #4caf50; }
.red { color: #ff4d4d; }
.yellow { color: #ffc107; }

.bar {
  width: 100%;
  height: 8px;
  background: #333;
  border-radius: 6px;
  margin-top: 6px;
}

.fill {
  height: 100%;
  width: 0%;
  background: #4caf50;
  border-radius: 6px;
  transition: width 0.3s;
}
  </style>
</head>

<body>
  <div class="container">
    <h1>Flip Finder AI</h1>

    <!-- LOGIN -->
    <div class="card" id="loginCard">
      <button onclick="login()">Continue with Google</button>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">

      <!-- USER -->
      <div class="card">
        <div id="userInfo"></div>
        <button onclick="logout()">Logout</button>
      </div>

      <!-- SCAN (placeholder for Botpress later) -->
      <div class="card">
        <h3>Scan Item (coming soon)</h3>
        <input type="file" id="imageInput" />
      </div>

      <!-- CALCULATOR -->
      <div class="card">
        <h3>Deal Calculator</h3>
        <input id="itemName" placeholder="Item name" />

<div class="row">
  <input id="buy" type="number" placeholder="Buy $" />
  <input id="sell" type="number" placeholder="Sell $" />
</div>

<div class="row">
  <input id="fee" type="number" placeholder="Fee %" value="13" />
  <input id="shipping" type="number" placeholder="Shipping $" value="5" />
</div>

<label>
  <input type="checkbox" id="buyerPays" />
  Buyer pays shipping
</label>

<input id="targetProfit" type="number" placeholder="Target profit (optional)" />

<div id="results"></div>

<div class="bar">
  <div id="fill" class="fill"></div>
</div>

<button onclick="saveDeal()">Save Deal</button>
      </div>

      <!-- DEAL LOG -->
      <div class="card">
        <h3>Your Deals</h3>
        <button class="small-btn" onclick="clearDeals()">Clear All</button>
        <div id="dealList"></div>
      </div>

    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCUXGwHEoTSiK8ZvIkCXUGPmvk1z3NU3_M",
  authDomain: "flipfinder-ai.firebaseapp.com",
  databaseURL: "https://flipfinder-ai-default-rtdb.firebaseio.com/",
  projectId: "flipfinder-ai",
  storageBucket: "flipfinder-ai.firebasestorage.app",
  messagingSenderId: "254057060734",
  appId: "1:254057060734:web:ef1c31ae19a3d409883b2f"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    window.login = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    console.log("Logged in:", result.user);
  } catch (err) {
    console.error("Login error:", err);
    alert(err.message);
  }
};

    window.logout = async () => {
      await signOut(auth);
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById("loginCard").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("userInfo").innerText = user.email;

        loadDeals();
      } else {
        currentUser = null;
        document.getElementById("loginCard").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
      }
    });

    window.calculate = () => {
  const buy = parseFloat(document.getElementById("buy").value) || 0;
  const sell = parseFloat(document.getElementById("sell").value) || 0;
  const feePercent = parseFloat(document.getElementById("fee").value) || 13;
  const shippingInput = parseFloat(document.getElementById("shipping").value) || 5;
  const buyerPays = document.getElementById("buyerPays").checked;
  const targetProfit = parseFloat(document.getElementById("targetProfit").value) || 0;

  const shipping = buyerPays ? 0 : shippingInput;
  const fees = sell * (feePercent / 100);
  const profit = sell - buy - fees - shipping;
  const roi = buy > 0 ? (profit / buy) * 100 : 0;

  let maxBuy = sell - fees - shipping;
  if (targetProfit > 0) {
    maxBuy = sell - fees - shipping - targetProfit;
  }

  let decision = "", cls = "", insight = "", confidence = 0;

  if (profit > 0 && roi > 50) {
    decision = "🔥 BUY"; cls = "green";
    insight = "Excellent margin. Strong flip.";
    confidence = 90;
  } else if (profit > 0 && roi > 25) {
    decision = "✅ GOOD"; cls = "green";
    insight = "Solid deal worth considering.";
    confidence = 65;
  } else if (profit > 0) {
    decision = "⚠️ RISKY"; cls = "yellow";
    insight = "Low margin. Be cautious.";
    confidence = 45;
  } else {
    decision = "❌ SKIP"; cls = "red";
    insight = "Not profitable.";
    confidence = 15;
  }

  document.getElementById("results").innerHTML = `
    <b class="${cls}">${decision}</b><br>
    Profit: $${profit.toFixed(2)}<br>
    ROI: ${roi.toFixed(1)}%<br>
    Max Buy: $${maxBuy.toFixed(2)}<br>
    <small>${insight}</small>
  `;

  const fill = document.getElementById("fill");
  fill.style.width = confidence + "%";
  fill.style.background =
    confidence > 70 ? "#4caf50" :
    confidence > 40 ? "#ffc107" : "#ff4d4d";
};
    
    window.saveDeal = () => {
  if (!currentUser) return;

  const itemName = document.getElementById("itemName").value.trim();
  const buy = parseFloat(document.getElementById("buyPrice").value);
  const sell = parseFloat(document.getElementById("sellPrice").value);

  if (!itemName || !buy || !sell) {
    alert("Fill all fields");
    return;
  }

  const fee = sell * 0.13;
  const profit = sell - buy - fee;
  const roi = (profit / buy) * 100;

  push(ref(db, "deals/" + currentUser.uid), {
    itemName,
    buy,
    sell,
    profit,
    roi,
    createdAt: Date.now()
  });

  // clear inputs
  document.getElementById("itemName").value = "";
  document.getElementById("buyPrice").value = "";
  document.getElementById("sellPrice").value = "";
  document.getElementById("results").innerHTML = "";
};

    function loadDeals() {
      const dealsArray = Object.entries(data || {}).map(([id, d]) => ({ id, ...d }));

dealsArray.sort((a, b) => b.createdAt - a.createdAt);

dealsArray.forEach(d => {
  const div = document.createElement("div");
  div.className = "deal";

  div.innerHTML = `
    <b>${d.itemName}</b><br>
    Profit: $${d.profit.toFixed(2)} | ROI: ${d.roi.toFixed(1)}%<br>
    <button class="small-btn" onclick="deleteDeal('${d.id}')">Delete</button>
  `;

  container.appendChild(div);
});

    }
    ["buyPrice", "sellPrice"].forEach(id => {
    document.getElementById(id).addEventListener("input", calculate);
  });
    ["buy","sell","fee","shipping","targetProfit"].forEach(id => {
  document.getElementById(id).addEventListener("input", calculate);
});

document.getElementById("buyerPays").addEventListener("change", calculate);

    window.deleteDeal = (id) => {
  remove(ref(db, "deals/" + currentUser.uid + "/" + id));
};

window.clearDeals = () => {
  if (confirm("Delete all deals?")) {
    remove(ref(db, "deals/" + currentUser.uid));
  }
};
  </script>
</body>
</html>
